<!DOCTYPE html>
<html>

<head>
    <title>Foodie App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: white;
        }

        header {
            text-align: center;
            padding: 15px;
            background: #1f1f1f;
        }

        .logo {
            font-size: 34px;
            font-weight: bold;
        }

        nav {
            text-align: center;
            background: #151515;
            padding: 12px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover {
            color: gold;
        }

        .hero {
            text-align: center;
            padding: 50px 20px;
            background: #222;
        }

        .hero img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid gold;
            object-fit: cover;
        }

        .hero p {
            max-width: 500px;
            margin: auto;
            color: #ccc;
            line-height: 1.5;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 12px;
        }

        .card img {
            width: 100%;
            height: 140px;
            border-radius: 10px;
            object-fit: cover;
        }

        .card button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: gold;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 10px;
            background: #333;
        }
    </style>

</head>

<body>

    <header>
        <div class="logo">🍔 Foodie</div>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="burgers.html">Burger</a>
        <a href="drinks.html">Drinks</a>
        <a href="pasta.html">Pasta</a>
        <a href="pizza.html">Pizza</a>
        <a href="cart.html">Cart 🛒</a>
    </nav>

    <div class="hero">
        <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
        <h1>Welcome to Foodie 🍕</h1>

        <p>
            Fresh meals delivered to your door.<br>
            Pick food, add to cart, enjoy.
        </p>
    </div>

    <div class="container" id="foodList"></div>

    <script>
        // ONE SINGLE SUPABASE CLIENT (FIXED)
        const supabase = window.supabase.createClient(
            "https://liirxonksalpchfzrzaf.supabase.co",
            "YOUR_ANON_KEY_HERE"
        );

        // FIXED LOGIN CHECK
        async function checkUser() {
            const { data } = await supabase.auth.getUser();

            if (!data.user) {
                window.location.href = "login.html";
            }
        }

        checkUser();

        // LOAD FOOD
        async function loadFood() {
            const { data, error } = await supabase
                .from("products")
                .select("*");

            const box = document.getElementById("foodList");

            if (error) {
                box.innerHTML = "<p style='color:red'>Error loading food</p>";
                return;
            }

            box.innerHTML = "";

            for (let i = 0; i < data.length; i++) {
                box.innerHTML += `
                <div class="card">
                    <img src="${data[i].image_url}">
                    <h3>${data[i].name}</h3>
                    <p>৳${data[i].price}</p>
                    <button onclick="addToCart('${data[i].name}', ${data[i].price})">
                        Add
                    </button>
                </div>
                `;
            }
        }

        function addToCart(name, price) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.push({ name, price });
            localStorage.setItem("cart", JSON.stringify(cart));
            alert("Added 🛒");
        }

        loadFood();
    </script>

    <footer>
        Welcome My Dear Food Lovers. Have A Delicious Day!
    </footer>

</body>

</html>
