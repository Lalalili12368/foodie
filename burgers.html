<!DOCTYPE html>
<html>

<head>
    <title>Burgers</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #111;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        nav {
            text-align: center;
            background: #1f1f1f;
            padding: 12px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #1e1e1e;
            padding: 10px;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 225px;
            object-fit: contain;
            background: black;
        }

        .price {
            margin: 10px;
            font-weight: bold;
        }

        button {
            background: gold;
            padding: 10px;
            width: 100%;
            border: none;
            font-weight: bold;
        }

        button:hover {
            background: #ffcc00;
        }

        footer {
            background: #333;
            text-align: center;
            padding: 10px;
            color: white;
        }
    </style>

</head>

<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="pizza.html">Pizza</a>
        <a href="pasta.html">Pasta</a>
        <a href="drinks.html">Drinks</a>
        <a href="cart.html">Cart</a>
    </nav>

    <h1>Burgers</h1>

    <div class="grid">

        <div class="card">
            <img src="images/burg1.jpg">
            <div class="price">৳120</div>
            <button onclick="addToCart('Classic Burger',120)">Add to Cart</button>
        </div>

        <div class="card">
            <img src="images/burg2.jpg">
            <div class="price">৳150</div>
            <button onclick="addToCart('Cheese Burger',150)">Add to Cart</button>
        </div>

        <div class="card">
            <img src="images/burg3.jpg">
            <div class="price">৳180</div>
            <button onclick="addToCart('Spicy Burger',180)">Add to Cart</button>
        </div>

    </div>

    <script>
        function addToCart(name, price) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.push({ name, price });
            localStorage.setItem("cart", JSON.stringify(cart));
            window.location.href = "cart.html";
        }
    </script>

    <footer>
        Planning On Eating One Of These? Even I Am Jealous!
    </footer>

</body>

</html>
