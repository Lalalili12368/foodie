<!DOCTYPE html>
<html>

<head>
    <title>Cart</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #111;
            color: white;
        }

        header {
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            background: #1f1f1f;
        }

        nav {
            text-align: center;
            background: #151515;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-size: 14px;
        }

        .cart {
            padding: 20px;
        }

        .item {
            display: flex;
            gap: 15px;
            background: #1e1e1e;
            padding: 12px;
            margin-bottom: 10px;
            align-items: center;
        }

        .item img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
        }

        .info {
            flex: 1;
        }

        .price {
            color: gold;
            font-weight: bold;
        }

        button {
            background: red;
            color: white;
            border: none;
            padding: 8px;
        }

        .total {
            text-align: center;
            padding: 15px;
            color: gold;
            font-size: 20px;
        }

        .empty {
            text-align: center;
            margin-top: 60px;
            color: gray;
        }
    </style>

</head>

<body>

    <header>Cart</header>

    <nav>
        <a href="index.html">Home</a>
        <a href="burgers.html">Burgers</a>
        <a href="pizza.html">Pizza</a>
        <a href="pasta.html">Pasta</a>
        <a href="drinks.html">Drinks</a>
    </nav>

    <div id="cart" class="cart"></div>
    <div id="total" class="total"></div>

    <script>

        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        function showCart() {

            let box = document.getElementById("cart");
            let totalBox = document.getElementById("total");

            box.innerHTML = "";

            if (cart.length == 0) {
                box.innerHTML = "<div class='empty'>Cart is empty</div>";
                totalBox.innerHTML = "";
                return;
            }

            let total = 0;

            for (let i = 0; i < cart.length; i++) {

                total = total + cart[i].price;

                box.innerHTML += `
<div class="item">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

<div class="info">
<h3>${cart[i].name}</h3>
<p class="price">৳${cart[i].price}</p>
</div>

<button onclick="removeItem(${i})">Remove</button>
</div>
`;
            }

            totalBox.innerHTML = "Total: ৳" + total;

        }

        function removeItem(i) {
            cart.splice(i, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            showCart();
        }

        showCart();

    </script>

</body>

</html>
